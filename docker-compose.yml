version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: predictus_postgres
    restart: unless-stopped
    
    # Variáveis de ambiente
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: predictus_db
      PGDATA: /var/lib/postgresql/data/pgdata
    
    # Volumes para persistência de dados
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    
    # Portas
    ports:
      - "5432:5432"
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Networks
    networks:
      - predictus_network

  # Opcional: pgAdmin para gerenciar banco visualmente
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: predictus_pgadmin
    restart: unless-stopped
    
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    
    ports:
      - "5050:80"
    
    depends_on:
      - postgres
    
    networks:
      - predictus_network

volumes:
  postgres_data:
    driver: local

networks:
  predictus_network:
    driver: bridge
